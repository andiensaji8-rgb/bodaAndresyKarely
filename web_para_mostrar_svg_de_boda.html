<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación de Boda</title>
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: #f5f1ea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 20px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border-radius: 16px;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
    }

    .buttons {
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .btn {
      flex: 1;
      text-align: center;
      padding: 12px;
      background: #c8a96a;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #a88c55;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Aquí se muestra tu SVG -->
    <iframe src="Ceremonia Religiosa y Recepcion.svg"></iframe>

    <div class="buttons">
      <a class="btn" href="Ceremonia Religiosa y Recepcion.svg" download>Descargar</a>
      <a class="btn" href="https://maps.google.com" target="_blank">Ver ubicación</a>
    </div>
  </div>

</body>
</html>
