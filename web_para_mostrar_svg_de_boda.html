<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación de Boda - Andrés y Karely</title>
    <style>
        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #f5f1ea 0%, #e8dfd6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            border-radius: 16px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #c8a96a 0%, #a88c55 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: normal;
            letter-spacing: 2px;
        }

        .header p {
            margin: 10px 0 0 0;
            font-size: 1.1em;
            opacity: 0.95;
        }

        .content {
            padding: 40px 20px;
            text-align: center;
        }

        .info-box {
            background: #f9f7f4;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #c8a96a;
        }

        .info-box p {
            margin: 8px 0;
            color: #333;
            font-size: 1em;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .btn {
            padding: 14px 28px;
            background: #c8a96a;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 1em;
            font-weight: bold;
            border: 2px solid #c8a96a;
        }

        .btn:hover {
            background: #a88c55;
            border-color: #a88c55;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(200, 169, 106, 0.3);
        }

        .btn-secondary {
            background: white;
            color: #c8a96a;
        }

        .btn-secondary:hover {
            background: #f9f7f4;
            color: #a88c55;
        }

        .footer {
            padding: 20px;
            background: #f9f7f4;
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>✨ Andrés y Karely ✨</h1>
            <p>¡Nos gustaría que fueras parte de nuestro gran día!</p>
        </div>

        <div class="content">
            <div class="info-box">
                <p><strong>📋 Invitación Completa</strong></p>
                <p>Descarga tu invitación en PDF con todos los detalles de nuestra ceremonia y recepción.</p>
            </div>

            <div class="buttons">
                <a class="btn" href="Ceremonia Religiosa y Recepcion (2).pdf" download>
                    📥 Descargar Invitación
                </a>
                <a class="btn btn-secondary" href="https://maps.google.com" target="_blank">
                    📍 Ver Ubicación
                </a>
            </div>
        </div>

        <div class="footer">
            <p>¡Gracias por acompañarnos en este momento tan especial! 💕</p>
        </div>
    </div>

</body>
</html>
