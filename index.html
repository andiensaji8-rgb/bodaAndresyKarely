<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Boda Andrés & Karely</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f1ea, #e8dfd6);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 1000px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);} 
            to {opacity: 1; transform: translateY(0);} 
        }

        .header {
            background: linear-gradient(135deg, #c8a96a, #a88c55);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5em;
            margin: 0;
        }

        .date {
            margin-top: 10px;
            font-size: 1.1em;
        }

        .countdown {
            margin-top: 15px;
            font-size: 1.2em;
        }

        .pdf-viewer {
            width: 100%;
            height: 600px;
            border: none;
        }

        .section {
            padding: 25px;
            text-align: center;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            background: #c8a96a;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #a88c55;
            transform: scale(1.05);
        }

        audio { display: none; }

        @media (max-width: 600px) {
            .pdf-viewer { height: 450px; }
            .header h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>

<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <div class="header">
        <h1>✨ Andrés & Karely ✨</h1>
        <p>¡Nos gustaría que fueras parte de nuestro gran día!</p>
        <div class="date">📅 15 de agosto de 2026 · 🕑 2:00 PM</div>
        <div class="countdown" id="countdown"></div>
    </div>

    <iframe class="pdf-viewer" src="https://docs.google.com/gview?url=https://github.com/andiensaji8-rgb/bodaAndresyKarely/raw/main/Ceremonia%20Religiosa%20y%20Recepcion%20(2).pdf&embedded=true"></iframe>

    <div class="section">
        <h2>📍 Ubicación</h2>
        <a class="btn" href="https://maps.app.goo.gl/rxnKV2LaLfoJeEDS6" target="_blank">Ver en Google Maps</a>
    </div>

    <div class="section">
        <h2>📸 Comparte tus fotos</h2>
        <a class="btn" href="https://photos.app.goo.gl/M5ive7yM3Q6gWy5r6" target="_blank">Subir Fotos</a>
    </div>

    <div class="section">
        <a href="https://github.com/andiensaji8-rgb/bodaAndresyKarely/raw/main/Ceremonia%20Religiosa%20y%20Recepcion%20(2).pdf" class="btn" download>Descargar Invitación</a>
    </div>

</div>

<script>
    const weddingDate = new Date("2026-08-15T14:00:00").getTime();

    setInterval(() => {
        const now = new Date().getTime();
        const diff = weddingDate - now;

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);

        document.getElementById("countdown").innerHTML =
            `Faltan ${days} días, ${hours} hrs y ${minutes} min`;
    }, 1000);
</script>

</body>
</html>
