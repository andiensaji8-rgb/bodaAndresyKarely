<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f9f9f9;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #4A4A4A;
            margin-bottom: 10px;
        }
        .content {
            text-align: center;
        }
        .divider {
            width: 60%;
            height: 2px;
            background-color: #e0e0e0;
            margin: 20px auto;
        }
        img {
            max-width: 100%;
            height: auto;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>You're Invited to Our Wedding!</h1>
    <div class="content">
        <img src="https://images.unsplash.com/photo-1565299638059-eeff726210c4" alt="Beautiful Wedding Rings" />
        <div class="divider"></div>
        <img src="https://images.unsplash.com/photo-1517138149850-3bbed4b19c05" alt="Wedding Flowers" />
        <div class="divider"></div>
        <img src="https://images.unsplash.com/photo-1501601675776-c8d6c9de8f02" alt="Ceremony Image" />
        <div class="divider"></div>
        <p>Join us for a day filled with love and happiness.</p>
    </div>
</body>
</html>
